services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: marketpilot
      POSTGRES_PASSWORD: marketpilot
      POSTGRES_USER: marketpilot
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U marketpilot -d marketpilot"]
      interval: 5s
      timeout: 3s
      retries: 10
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - marketpilot_postgres_data:/var/lib/postgresql/data

volumes:
  marketpilot_postgres_data:
